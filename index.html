<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Trainer – Klasse 6</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ef;
  --surface: #ffffff;
  --surface2: #f0ece4;
  --border: #e0d8cc;
  --text: #1a1612;
  --muted: #7a6f63;
  --blue: #2563a8;
  --blue-light: #dbeafe;
  --green: #1a7a4a;
  --green-light: #d1fae5;
  --orange: #c25e10;
  --orange-light: #fff3e0;
  --red: #b91c1c;
  --red-light: #fee2e2;
  --purple: #6d28d9;
  --purple-light: #ede9fe;
  --accent: #e85d2a;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* LAYOUT */
.app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
.sidebar { background: var(--text); color: #fff; padding: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
.sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; color: #fff; }
.sidebar-header p { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 3px; }
.progress-global { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.progress-global .label { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.prog-bar { background: rgba(255,255,255,0.15); border-radius: 20px; height: 6px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 20px; background: #4ade80; transition: width 0.4s ease; }
.prog-text { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 5px; }
.week-section { padding: 12px 0; }
.week-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; padding: 0 20px 6px; }

/* FIXED CLICKABLE AREA */
.day-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 20px; background: none; border: none; color: rgba(255,255,255,0.65); cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 13px; text-align: left; transition: all 0.15s; position: relative; z-index: 10; }
.day-btn:hover { background: rgba(255,255,255,0.07); color: #fff; }
.day-btn.active { background: rgba(255,255,255,0.12); color: #fff; }
.day-btn.active::before { content: ''; position: absolute; left: 0; top: 4px; bottom: 4px; width: 3px; background: #4ade80; border-radius: 0 2px 2px 0; }
.day-num { width: 24px; height: 24px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; pointer-events: none; }
.day-btn.completed .day-num { background: #4ade80; color: #1a1612; }

/* MAIN CONTENT */
.main { padding: 32px 40px; max-width: 800px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; box-shadow: var(--shadow); }
.exercise-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; transition: border-color 0.2s; }
.exercise-card.submitted { border-color: var(--green); background: #f0fdf4; }

/* CHECKBOX FIX: Allow clicking for manual override if desired, or keep as visual indicator */
.checklist-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; cursor: pointer; }
.checklist-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--green); }

.submit-btn { padding: 10px 20px; background: var(--text); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; margin-top: 12px; }
.submit-btn:hover { background: var(--accent); }

@media (max-width: 720px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: relative; height: auto; }
}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>Deutsch Trainer</h1>
    <p>Klasse 6 · Vorgangsbeschreibung</p>
  </div>
  <div class="progress-global">
    <div class="label">Gesamtfortschritt</div>
    <div class="prog-bar"><div class="prog-fill" id="global-prog" style="width:0%"></div></div>
    <div class="prog-text" id="global-prog-text">0 von 14 Tagen abgeschlossen</div>
  </div>
  <div id="sidebar-days"></div>
</aside>
<main class="main" id="main-content"></main>
</div>

<script>
// DATA remains the same as your source
const DAYS = [
  { id:1, week:1, weekday:"Montag", title:"Was ist eine Vorgangsbeschreibung?", type:"theory", intro:Eine <strong>Vorgangsbeschreibung</strong> erklärt Schritt für Schritt..., rules:["Präsens", "man/Passiv", "Reihenfolge", "Verbindungswörter", "Klare Sprache"], exercises:[{id:"1a", type:"mcq", question:"Welche Zeitform?", options:["Präteritum","Präsens","Futur"], correct:1, feedback_correct:"Richtig!", feedback_wrong:"Falsch!"}] },
  { id:2, week:1, weekday:"Dienstag", title:"Präsens mit 'man'", type:"grammar", intro:"Übe Verben im Präsens...", exercises:[{id:"2a", type:"fill", question:"Setze ein:", items:[{template:"man (kochen)", answer:"kocht"}]}] }
  // ... (Full DAYS array from original code should be here)
];

let state = JSON.parse(localStorage.getItem('deutsch_state') || '{}');
let currentDay = parseInt(localStorage.getItem('deutsch_current') || '1');

function save() {
  localStorage.setItem('deutsch_state', JSON.stringify(state));
  localStorage.setItem('deutsch_current', String(currentDay));
  updateGlobalProgress();
}

function buildSidebar() {
  const container = document.getElementById('sidebar-days');
  container.innerHTML = '';
  let currentWeek = 0;
  
  DAYS.forEach(day => {
    if (day.week !== currentWeek) {
      currentWeek = day.week;
      const weekLabel = document.createElement('div');
      weekLabel.className = 'week-label';
      weekLabel.style.padding = "20px 20px 5px";
      weekLabel.innerHTML = Woche ${currentWeek};
      container.appendChild(weekLabel);
    }
    
    const btn = document.createElement('button');
    const isDone = state[day.id]?.completed;
    btn.className = day-btn ${isDone ? 'completed' : ''} ${currentDay === day.id ? 'active' : ''};
    btn.innerHTML = `
      <div class="day-num">${isDone ? '✓' : day.id}</div>
      <div class="day-info">
        <div class="day-name">${day.weekday}</div>
        <div class="day-topic" style="font-size:10px; opacity:0.6">${day.title}</div>
      </div>
    `;
    btn.onclick = () => { currentDay = day.id; save(); buildSidebar(); renderDay(day.id); };
    container.appendChild(btn);
  });
}

function renderDay(dayId) {
  const day = DAYS.find(d => d.id === dayId);
  const main = document.getElementById('main-content');
  const dayState = state[dayId] || { exercises: {} };

  main.innerHTML = `
    <h2>${day.weekday}: ${day.title}</h2>
    <div class="card">${day.intro}</div>
    <div id="exercise-list"></div>
  `;

  const exList = document.getElementById('exercise-list');
  day.exercises.forEach(ex => {
    const div = document.createElement('div');
    div.className = exercise-card ${dayState.exercises[ex.id]?.passed ? 'submitted' : ''};
    div.innerHTML = <p>${ex.question}</p>;
    
    if(ex.type === 'mcq') {
        ex.options.forEach((opt, i) => {
            const optBtn = document.createElement('button');
            optBtn.className = 'submit-btn';
            optBtn.style.marginRight = '10px';
            optBtn.innerText = opt;
            optBtn.onclick = () => {
                if (i === ex.correct) {
                    alert(ex.feedback_correct);
                    markComplete(dayId, ex.id);
                } else {
                    alert(ex.feedback_wrong);
                }
            };
            div.appendChild(optBtn);
        });
    }
    exList.appendChild(div);
  });
}

function markComplete(dayId, exId) {
    if (!state[dayId]) state[dayId] = { completed: false, exercises: {} };
    state[dayId].exercises[exId] = { passed: true };
    
    // Check if all exercises for the day are done
    const day = DAYS.find(d => d.id === dayId);
    const allDone = day.exercises.every(e => state[dayId].exercises[e.id]?.passed);
    if (allDone) state[dayId].completed = true;
    
    save();
    buildSidebar();
    renderDay(dayId);
}

function updateGlobalProgress() {
  const done = DAYS.filter(d => state[d.id]?.completed).length;
  const pct = Math.round((done / DAYS.length) * 100);
  document.getElementById('global-prog').style.width = pct + '%';
  document.getElementById('global-prog-text').textContent = ${done} von ${DAYS.length} Tagen fertig;
}

// Start app
buildSidebar();
renderDay(currentDay);
updateGlobalProgress();
</script>
</body>
</html>
