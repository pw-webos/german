<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Trainer – Klasse 6</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ef; --surface: #ffffff; --border: #e0d8cc; --text: #1a1612;
  --muted: #7a6f63; --blue: #2563a8; --blue-light: #dbeafe;
  --green: #1a7a4a; --green-light: #d1fae5; --orange: #c25e10;
  --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); }
.app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
.sidebar { background: var(--text); color: #fff; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.prog-bar { background: rgba(255,255,255,0.2); height: 8px; border-radius: 4px; margin: 10px 20px; overflow: hidden; }
.prog-fill { background: #4ade80; height: 100%; width: 0%; transition: 0.3s; }
.day-btn { width: 100%; padding: 12px 20px; background: none; border: none; color: rgba(255,255,255,0.6); text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.day-btn.active { background: rgba(255,255,255,0.1); color: #fff; }
.day-btn.completed { color: #4ade80; }
.day-num { width: 24px; height: 24px; border-radius: 50%; border: 1px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 11px; }
.main { padding: 40px; max-width: 900px; margin: 0 auto; }
.card { background: #fff; padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 20px; }
.exercise-card { border: 2px solid var(--border); padding: 20px; border-radius: var(--radius); margin-bottom: 15px; }
.exercise-card.done { border-color: var(--green); background: var(--green-light); }
.option-btn { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; text-align: left; background: #fff; }
.option-btn:hover { background: var(--blue-light); }
.submit-btn { background: var(--text); color: #fff; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; margin-top: 10px; }
input { padding: 8px; border: 1px solid var(--border); border-radius: 4px; margin: 5px; }
@media (max-width: 768px) { .app { grid-template-columns: 1fr; } .sidebar { height: auto; position: relative; } }
</style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="sidebar-header"><h3>Deutsch Trainer</h3><p>Klasse 6</p></div>
        <div class="prog-bar"><div id="prog-fill" class="prog-fill"></div></div>
        <div id="sidebar-list"></div>
    </aside>
    <main class="main" id="content"></main>
</div>

<script>
const DAYS = [
    { id: 1, title: "Was ist eine Vorgangsbeschreibung?", intro: "Erkläre Schritte sachlich im Präsens.", exercises: [
        { id: "1a", type: "mcq", q: "Welche Zeitform nutzt man?", options: ["Präteritum", "Präsens", "Futur"], correct: 1 }
    ]},
    { id: 2, title: "Präsens mit 'man'", intro: "Übe Verben: man nimmt, man gibt.", exercises: [
        { id: "2a", type: "fill", q: "Fülle aus:", items: [{ t: "man (kochen) -> man", a: "kocht" }, { t: "man (falten) -> man", a: "faltet" }] }
    ]}
];

let state = JSON.parse(localStorage.getItem('dt_state') || '{}');
let current = 1;

function save() {
    localStorage.setItem('dt_state', JSON.stringify(state));
    renderSidebar();
}

function renderSidebar() {
    const list = document.getElementById('sidebar-list');
    list.innerHTML = '';
    let completedCount = 0;
    
    DAYS.forEach(d => {
        const isDone = state[d.id]?.done;
        if(isDone) completedCount++;
        const btn = document.createElement('button');
        btn.className = `day-btn ${current === d.id ? 'active' : ''} ${isDone ? 'completed' : ''}`;
        btn.innerHTML = `<div class="day-num">${isDone ? '✓' : d.id}</div><span>${d.title}</span>`;
        btn.onclick = () => { current = d.id; renderContent(); renderSidebar(); };
        list.appendChild(btn);
    });
    document.getElementById('prog-fill').style.width = (completedCount / DAYS.length * 100) + '%';
}

function renderContent() {
    const d = DAYS.find(x => x.id === current);
    const cont = document.getElementById('content');
    const dState = state[current] || { ex: {} };
    
    cont.innerHTML = `<h1>Tag ${d.id}: ${d.title}</h1><div class="card">${d.intro}</div><div id="ex-area"></div>`;
    
    const area = document.getElementById('ex-area');
    d.exercises.forEach(ex => {
        const card = document.createElement('div');
        const isExDone = dState.ex[ex.id];
        card.className = `exercise-card ${isExDone ? 'done' : ''}`;
        card.innerHTML = `<h4>${ex.q}</h4>`;
        
        if(ex.type === 'mcq') {
            ex.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.disabled = isExDone;
                b.onclick = () => {
                    if(i === ex.correct) { alert("Richtig!"); finishEx(d.id, ex.id); }
                    else alert("Versuch es nochmal.");
                };
                card.appendChild(b);
            });
        } else if(ex.type === 'fill') {
            ex.items.forEach((item, i) => {
                const line = document.createElement('div');
                line.innerHTML = `${item.t} <input id="f-${ex.id}-${i}" ${isExDone ? 'disabled' : ''} value="${isExDone ? item.a : ''}">`;
                card.appendChild(line);
            });
            if(!isExDone) {
                const b = document.createElement('button');
                b.className = 'submit-btn';
                b.innerText = 'Prüfen';
                b.onclick = () => {
                    const allRight = ex.items.every((it, idx) => document.getElementById(`f-${ex.id}-${idx}`).value.toLowerCase().trim() === it.a);
                    if(allRight) { alert("Super!"); finishEx(d.id, ex.id); }
                    else alert("Einige Antworten sind noch falsch.");
                };
                card.appendChild(b);
            }
        }
        area.appendChild(card);
    });
}

function finishEx(dayId, exId) {
    if(!state[dayId]) state[dayId] = { done: false, ex: {} };
    state[dayId].ex[exId] = true;
    const d = DAYS.find(x => x.id === dayId);
    if(d.exercises.every(e => state[dayId].ex[e.id])) state[dayId].done = true;
    save(); renderContent();
}

renderSidebar();
renderContent();
</script>
</body>
</html>
